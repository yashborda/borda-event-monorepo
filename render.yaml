# Render Blueprint — deploys the NestJS backend (apps/backend).
# Docs: https://render.com/docs/blueprint-spec
#
# How it works:
#   1. Render reads this file when you create a Blueprint linked to the repo.
#   2. On every push to `main`, Render runs buildCommand (install + nest build
#      + drizzle migrate), then restarts the web service with startCommand.
#   3. envVars with `sync: false` must be filled in once in Render's dashboard;
#      `generateValue: true` are auto-generated random 64-char strings.
#
# Free tier caveats:
#   - 512 MB RAM, single instance, spins down after 15 min idle
#   - Cold start ≈ 30 s (acceptable for admin-only traffic)
#   - Filesystem is EPHEMERAL — anything written to apps/backend/uploads/ is
#     lost on redeploy. All new uploads go to Drive anyway; legacy local-disk
#     URLs (the original Baby Shower cover image) will 404 after first deploy.

services:
  - type: web
    name: borda-event-backend
    runtime: node
    plan: free
    region: singapore # closest free region to Surat
    branch: main
    rootDir: .

    # Install all workspace deps (backend pulls @pkg/types from packages/),
    # compile the NestJS app, then apply any pending Drizzle migrations BEFORE
    # the new code goes live. If migrate fails, the deploy is aborted — safer
    # than running it on every cold start.
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter backend build
      pnpm --filter backend db:migrate

    # Start the compiled NestJS server. Render injects PORT; the backend reads
    # process.env.PORT in main.ts and listens on it.
    startCommand: node apps/backend/dist/main.js

    # Render's load balancer pings this. The backend's HealthModule exposes
    # /api/health out of the box (no auth required).
    healthCheckPath: /api/health

    envVars:
      # ── Runtime ───────────────────────────────────────────────
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      # PORT — do NOT set; Render injects its own internal port automatically.

      # ── Postgres (Neon) ───────────────────────────────────────
      # Get these from your Neon project dashboard → Connection details.
      # If you use the pooler endpoint, DB_HOST ends with `-pooler.neon.tech`.
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

      # ── JWT secrets ───────────────────────────────────────────
      # Auto-generated by Render — never need to be seen or shared.
      - key: WEBSITE_JWT_ACCESS_SECRET
        generateValue: true
      - key: WEBSITE_JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_JWT_ACCESS_SECRET
        generateValue: true
      - key: ADMIN_JWT_REFRESH_SECRET
        generateValue: true

      # ── Google Drive (OAuth-as-user) ──────────────────────────
      # Copy verbatim from your local apps/backend/.env.
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false

      # ── Mail (Resend / Gmail / SES) ───────────────────────────
      # Resend free tier (3000 emails/mo) is the recommended path. Their
      # SMTP host is smtp.resend.com:465 with user 'resend' and the API key
      # as the password.
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

      # ── App URLs ──────────────────────────────────────────────
      # APP_URL: this backend's own .onrender.com URL (e.g.
      #   https://borda-event-backend.onrender.com)
      # ADMIN_URL + WEBSITE_URL: your deployed admin + website URLs (Vercel
      #   etc.) — CORS allowlist reads from these.
      # Set after the first deploy, when Render has assigned the .onrender.com
      # subdomain.
      - key: APP_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: WEBSITE_URL
        sync: false

      # ── Cookies ───────────────────────────────────────────────
      # Required true on HTTPS for the admin auth refresh cookie to survive.
      - key: COOKIE_SECURE
        value: "true"

      # ── Optional revalidation hook (skip for now) ─────────────
      # - key: WEBSITE_REVALIDATE_URL
      #   sync: false
      # - key: WEBSITE_REVALIDATE_SECRET
      #   generateValue: true
